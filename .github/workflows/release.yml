name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/FigmaSearch/FigmaSearch.csproj

      - name: Build & Publish
        shell: bash
        run: |
          dotnet publish src/FigmaSearch/FigmaSearch.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o installer/publish

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Refresh PATH to pick up NSIS installation
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          # Also ensure both possible install locations are in PATH
          echo "C:\Program Files (x86)\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          echo "C:\Program Files\NSIS" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Create dist folder
        shell: bash
        run: mkdir -p installer/dist

      - name: Build NSIS installer
        shell: pwsh
        working-directory: installer
        run: |
          # Try both possible NSIS locations
          $nsisPath = if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
            "C:\Program Files (x86)\NSIS\makensis.exe"
          } elseif (Test-Path "C:\Program Files\NSIS\makensis.exe") {
            "C:\Program Files\NSIS\makensis.exe"
          } else {
            "makensis"  # fall back to PATH
          }
          & $nsisPath /DPRODUCT_VERSION=${{ steps.version.outputs.version }} setup.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/FigmaSearch_Setup.exe
          body: |
            ## v1.3.33 更新内容

            ### ⚡ 增量同步——更快、更省流量

            **之前**：每次同步都要对每个文件调用 Figma API 拉取页面列表，文档多的 Team 同步一次可能需要数十分钟。

            **现在**：同步前先对比 Figma 返回的文件修改时间（`last_modified`），**只对有变更的文件重新拉取页面**，未修改的文件直接跳过。

            **实际效果**：
            - 日常同步（大部分文件未改动）速度提升 **数倍到数十倍**
            - 减少大量 Figma API 调用，降低触发限流的概率
            - 同步完成后显示「更新 X 个文件，跳过 Y 个未变更」，一目了然

            **数据一致性**：
            - 文件被删除 → 下次同步自动从搜索索引中移除 ✅
            - Page 被删除/新增/改名 → Figma 同步更新文件 `last_modified`，下次同步自动处理 ✅
            - 上次同步页面获取失败的文件 → 强制重试，不会因「未变更」被跳过 ✅

            ---

            ## 历史更新记录

            ### v1.3.25
            - 新增：每个 Team 可单独配置 API Key，解决因权限不足导致部分文档页面无法同步的问题（设置 → Team 列表 → 独立 API Key 列）
            - 新增：更新后自动弹出更新日志，方便了解每次更新内容
            - 新增：设置中可选择「使用浏览器打开 Figma 链接」，解决桌面客户端打开后白屏的问题
            - 修复：同名 Page 在不同文档间互相覆盖导致搜索结果缺失
            - 修复：搜索结果数量上限从 16 条改为全量显示，不再遗漏匹配项
            - 修复：页面同步失败时增加自动重试（最多 3 次），并在同步完成后提示失败的文件名
            - 优化：对无法导出的文件（403）保留已有页面数据，避免反复清空

            ### v1.3.10 及更早
            - 新增：双击 Alt 唤醒搜索框（可自定义快捷键）
            - 新增：自动检查更新，一键下载安装
            - 新增：深色 / 浅色主题切换
            - 新增：开机自启动
            - 新增：搜索结果按 Team 分组，支持展开/折叠 Page 列表
            - 新增：优先尝试用 Figma 桌面客户端打开文件（figma:// 协议）
            - 修复：全局鼠标钩子检测点击范围外自动收起搜索框
            - 修复：中文子串搜索支持（LIKE 回退策略）
            - 修复：同步取消不丢数据，文件按最近修改时间优先同步
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
