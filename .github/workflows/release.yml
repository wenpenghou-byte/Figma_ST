name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/FigmaSearch/FigmaSearch.csproj

      - name: Build & Publish
        shell: bash
        run: |
          dotnet publish src/FigmaSearch/FigmaSearch.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.version }} \
            -o installer/publish

      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y
          echo "C:/Program Files (x86)/NSIS" >> $GITHUB_PATH

      - name: Create dist folder
        shell: bash
        run: mkdir -p installer/dist

      - name: Build NSIS installer
        shell: bash
        working-directory: installer
        run: '/c/Program Files (x86)/NSIS/makensis.exe setup.nsi'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/FigmaSearch_Setup_*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
